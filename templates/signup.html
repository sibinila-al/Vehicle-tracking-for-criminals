<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectX - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0f0f, #1a1a1a); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .signup-card { background: rgba(30, 30, 30, 0.9); border: 1px solid #333; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-futuristic { background: linear-gradient(45deg, #28a745, #20c997); border: none; color: white; }
        .btn-futuristic:hover { background: linear-gradient(45deg, #1e7e34, #17a2b8); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card signup-card">
                    <div class="card-header text-center">
                        <h2 class="text-light">ProjectX Sign Up</h2>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                <div class="alert alert-danger">{{ messages[0] }}</div>
                            {% endif %}
                        {% endwith %}
                        <form method="POST">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" 
                                       pattern="^[A-Z][a-zA-Z]*$" 
                                       title="Username must start with a capital letter and contain only letters"
                                       placeholder="e.g., John"
                                       required>
                                <small class="form-text text-muted">First letter must be capital, only letters allowed</small>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" 
                                       pattern="^.{6}$" 
                                       title="Password must be exactly 6 characters"
                                       placeholder="6 characters"
                                       required>
                                <small class="form-text text-muted">Must be exactly 6 characters</small>
                            </div>
                            <button type="submit" class="btn btn-futuristic w-100">Sign Up</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="{{ url_for('login') }}" class="text-light">Already have an account? Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
