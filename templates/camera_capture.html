<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectX - Camera Capture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0f0f, #1a1a1a); }
        .navbar { background: rgba(20, 20, 20, 0.9) !important; }
        .card { background: rgba(30, 30, 30, 0.9); border: 1px solid #333; }
        .btn-futuristic { background: linear-gradient(45deg, #007bff, #00d4ff); border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-light fw-bold">ProjectX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/camera_capture">Camera Capture</a></li>
                    <li class="nav-item"><a class="nav-link" href="/live_monitoring">Live Monitoring</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile Management</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin">Admin Management</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3>Camera Capture</h3>
                    </div>
                    <div class="card-body text-center">
                        <button id="captureBtn" class="btn btn-futuristic">Capture License Plate</button>
                        <div id="result" class="mt-3" style="display:none;">
                            <div class="alert alert-success">
                                <h5>Plate Detected!</h5>
                                <p id="plateInfo"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const captureBtn = document.getElementById('captureBtn');
        const result = document.getElementById('result');
        const plateInfo = document.getElementById('plateInfo');

        captureBtn.addEventListener('click', () => {
            fetch('/capture_single')
                .then(response => response.json())
                .then(data => {
                    if (data.plate) {
                        plateInfo.innerHTML = `
                            <strong>License Plate:</strong> ${data.plate}<br>
                            <strong>Date:</strong> ${data.date}<br>
                            <strong>Time:</strong> ${data.time}<br>
                            <strong>Location:</strong> ${data.location}
                        `;
                        result.style.display = 'block';
                    } else {
                        alert('No plate detected');
                    }
                });
        });
    </script>
</body>
</html>
