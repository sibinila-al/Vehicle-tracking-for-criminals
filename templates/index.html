<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Plate Monitoring - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">License Plate Monitor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/video">Video Feed</a></li>
                    <li class="nav-item"><a class="nav-link" href="/live">Live Monitoring</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="/criminal">Criminal History</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header">
                        <h2 class="card-title">License Plate Data</h2>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPlateModal">Add Plate</button>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped" id="dataTable">
                            <thead>
                                <tr>
                                    <th>Start Time</th>
                                    <th>End Time</th>
                                    <th>License Plates</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Plate Modal -->
    <div class="modal fade" id="addPlateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add License Plate to Monitor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" id="plateInput" placeholder="Enter license plate number">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="addPlateBtn">Add Plate</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="notification alert alert-success alert-dismissible fade show" role="alert" id="notification">
        <span id="notificationText"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const dataTableBody = document.querySelector('#dataTable tbody');
        const addPlateBtn = document.getElementById('addPlateBtn');
        const plateInput = document.getElementById('plateInput');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notificationText');

        addPlateBtn.addEventListener('click', () => {
            const plate = plateInput.value.trim().toUpperCase();
            if (plate) {
                fetch('/add_plate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plate })
                }).then(response => response.json()).then(data => {
                    if (data.status === 'added') {
                        plateInput.value = '';
                        $('#addPlateModal').modal('hide');
                        alert('Plate added successfully');
                    }
                });
            }
        });

        function loadData() {
            fetch('/data')
                .then(response => response.json())
                .then(data => {
                    dataTableBody.innerHTML = '';
                    data.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${item['Start Time']}</td>
                            <td>${item['End Time']}</td>
                            <td>${item['License Plate'].join(', ')}</td>
                        `;
                        dataTableBody.appendChild(row);
                    });
                });
        }

        function checkNotifications() {
            fetch('/notifications')
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        notificationText.textContent = data.message;
                        notification.style.display = 'block';
                        setTimeout(() => {
                            notification.style.display = 'none';
                        }, 5000);
                    }
                });
        }

        setInterval(loadData, 5000);
        setInterval(checkNotifications, 1000);
        loadData();
    </script>
</body>
</html>
