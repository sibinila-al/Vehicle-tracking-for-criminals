<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectX - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0f0f, #1a1a1a); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .admin-card { background: rgba(30, 30, 30, 0.9); border: 1px solid #333; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-admin { background: linear-gradient(45deg, #dc3545, #ff6b6b); border: none; color: white; }
        .btn-admin:hover { background: linear-gradient(45deg, #c82333, #e74c3c); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card admin-card">
                    <div class="card-header text-center">
                        <h2 class="text-light">Admin Access</h2>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                <div class="alert alert-danger">{{ messages[0] }}</div>
                            {% endif %}
                        {% endwith %}
                        <form method="POST">
                            <div class="mb-3">
                                <label for="pin" class="form-label">Admin PIN</label>
                                <input type="password" class="form-control" id="pin" name="pin" required>
                            </div>
                            <button type="submit" class="btn btn-admin w-100">Access Admin Panel</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/" class="text-light">Back to Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
