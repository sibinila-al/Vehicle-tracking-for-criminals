<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectX - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0f0f, #1a1a1a); }
        .navbar { background: rgba(20, 20, 20, 0.9) !important; }
        .card { background: rgba(30, 30, 30, 0.9); border: 1px solid #333; }
        .btn-admin { background: linear-gradient(45deg, #dc3545, #ff6b6b); border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-light fw-bold">ProjectX Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/admin_dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3>Admin Dashboard</h3>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-12" style="text-align: left;">
                                <h4>Vehicle Tracking</h4>
                                <div class="input-group mb-2" style="max-width: 420px;">
                                    <input type="text" id="trackPlate" class="form-control" placeholder="Enter license plate">
                                    <button class="btn btn-admin" onclick="trackVehicle()">Search</button>
                                </div>
                                <button id="downloadBtn" class="btn btn-secondary mb-3">Download Report</button>
                            </div>
                        </div>
                        <div class="mt-4">
                            <h4>Vehicle History</h4>
                            <table class="table table-striped" id="historyTable">
                                <thead>
                                    <tr>
                                        <th>Plate</th>
                                        <th>Date</th>
                                        <th>Time</th>
                                        <th>Location</th>
                                        <th>Camera</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function activateCamera() {
            fetch('/start_monitoring', { method: 'POST' })
                .then(response => response.json())
                .then(data => alert('Camera activated'));
        }

        function deactivateCamera() {
            fetch('/stop_monitoring', { method: 'POST' })
                .then(response => response.json())
                .then(data => alert('Camera deactivated'));
        }

        function drawHistory(data) {
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = '';
            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.plate}</td>
                    <td>${item.date}</td>
                    <td>${item.time}</td>
                    <td>${item.location}</td>
                    <td>${item.start}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function trackVehicle() {
            const plate = document.getElementById('trackPlate').value.trim();
            if (!plate) {
                alert('Please enter a license plate to search.');
                return;
            }
            fetch(`/search_plate?plate=${encodeURIComponent(plate)}`)
                .then(response => response.json())
                .then(data => {
                    drawHistory(data);
                    if (data.length === 0) {
                        alert(`No history found for plate: ${plate}`);
                    }
                })
                .catch(error => {
                    console.error('Error searching plate:', error);
                    alert('Error searching plate.');
                });
        }

        function loadHistory() {
            fetch('/get_live_data')
                .then(response => response.json())
                .then(data => {
                    drawHistory(data);
                })
                .catch(error => console.error('Error loading history:', error));
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const plate = document.getElementById('trackPlate').value.trim();
            const url = plate ? `/download_plate_history?plate=${encodeURIComponent(plate)}` : '/download_plate_history';
            window.location.href = url;
        });

        setInterval(loadHistory, 5000);
        loadHistory();
    </script>
</body>
</html>
