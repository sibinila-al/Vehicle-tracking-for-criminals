<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectX - History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0f0f, #1a1a1a); }
        .navbar { background: rgba(20, 20, 20, 0.9) !important; }
        .card { background: rgba(30, 30, 30, 0.9); border: 1px solid #333; }
        .btn-futuristic { background: linear-gradient(45deg, #007bff, #00d4ff); border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-light fw-bold">ProjectX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/live_monitoring">Live Monitoring</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile Management</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin">Admin Management</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/history">History</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3>Complete Monitoring History</h3>
                        <button id="refreshBtn" class="btn btn-success mt-2">Refresh History</button>
                        <button id="downloadHistoryBtn" class="btn btn-primary mt-2 ms-2">Download Report</button>
                    </div>
                    <div class="card-body">
                        <div id="historicalSessionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const container = document.getElementById('historicalSessionsContainer');
        const refreshBtn = document.getElementById('refreshBtn');

        function loadHistoricalData() {
            fetch('/get_historical_data')
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = '';
                    
                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="alert alert-info">No historical data available</div>';
                        return;
                    }

                    // Create accordion for each monitoring session
                    const accordion = document.createElement('div');
                    accordion.className = 'accordion';
                    accordion.id = 'historicalAccordion';

                    data.forEach((session, index) => {
                        const startTime = session['Start Time'];
                        const endTime = session['End Time'];
                        const plates = session['License Plate'] || [];
                        const totalPlates = plates.length;

                        const accordionItem = document.createElement('div');
                        accordionItem.className = 'accordion-item';
                        accordionItem.style.backgroundColor = 'rgba(30, 30, 30, 0.9)';
                        accordionItem.style.border = '1px solid #333';
                        accordionItem.style.marginBottom = '10px';
                        accordionItem.innerHTML = `
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}" style="background: rgba(0, 102, 204, 0.2); color: #00d4ff;">
                                    <strong>📊 Session ${index + 1}</strong> 
                                    <span style="margin-left: 20px; color: #90EE90;">🚗 ${totalPlates} vehicles detected</span>
                                    <span style="margin-left: 20px; color: #87CEEB;">⏱️ Start: ${startTime}</span>
                                </button>
                            </h2>
                            <div id="collapse${index}" class="accordion-collapse collapse" data-bs-parent="#historicalAccordion">
                                <div class="accordion-body" style="background: rgba(20, 20, 20, 0.8);">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <h5 style="color: #00d4ff;">Session Timeline</h5>
                                            <p><strong>Start Time:</strong> ${startTime}</p>
                                            <p><strong>End Time:</strong> ${endTime}</p>
                                        </div>
                                        <div class="col-md-6">
                                            <h5 style="color: #00d4ff;">Detection Summary</h5>
                                            <p><strong>Total Vehicles:</strong> <span style="color: #90EE90; font-size: 1.3em;">${totalPlates}</span></p>
                                        </div>
                                    </div>
                                    <hr style="border-color: #333;">
                                    <h5 style="color: #FFD700;">License Plates Detected:</h5>
                                    ${plates.length > 0 ? `
                                        <div class="row">
                                            ${plates.map((plate, plateIndex) => `
                                                <div class="col-md-4 mb-3">
                                                    <div style="background: rgba(13, 110, 253, 0.2); border: 2px solid #00d4ff; border-radius: 5px; padding: 10px; text-align: center;">
                                                        <strong style="color: #00d4ff; font-size: 1.4em;">${plate}</strong>
                                                        <p style="margin: 5px 0; color: #888; font-size: 0.9em;">Vehicle #${plateIndex + 1}</p>
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : `
                                        <p class="text-warning">No license plates detected in this session</p>
                                    `}
                                </div>
                            </div>
                        `;
                        accordion.appendChild(accordionItem);
                    });

                    container.appendChild(accordion);
                })
                .catch(error => {
                    console.error('Error loading historical data:', error);
                    container.innerHTML = '<div class="alert alert-danger">Error loading historical data</div>';
                });
        }

        refreshBtn.addEventListener('click', () => {
            loadHistoricalData();
        });

        document.getElementById('downloadHistoryBtn').addEventListener('click', () => {
            window.location.href = '/download_plate_history';
        });

        // Load data on page load
        loadHistoricalData();
    </script>
</body>
</html>
