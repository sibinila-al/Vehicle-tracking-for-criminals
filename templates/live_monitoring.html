<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectX - Live Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0f0f, #1a1a1a); }
        .navbar { background: rgba(20, 20, 20, 0.9) !important; }
        .card { background: rgba(30, 30, 30, 0.9); border: 1px solid #333; }
        .btn-futuristic { background: linear-gradient(45deg, #007bff, #00d4ff); border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-light fw-bold">ProjectX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/live_monitoring">Live Monitoring</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile Management</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin">Admin Management</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3>Live Monitoring</h3>
                        <div class="btn-group mb-3" role="group" aria-label="Camera selection">
                            <button id="camera1Btn" class="btn btn-outline-primary">Camera 1</button>
                            <button id="camera2Btn" class="btn btn-outline-primary">Camera 2</button>
                        </div>
                        
                        <!-- Timer Display -->
                        <div id="timerContainer" class="alert alert-info mb-3" style="display: none;">
                            <strong>Camera Selected!</strong> Start monitoring within 
                            <span id="timerDisplay" style="font-size: 1.5em; font-weight: bold; color: #007bff;">10</span> seconds
                        </div>
                        
                        <div>
                            <button id="startBtn" class="btn btn-success btn-lg" disabled>
                                <i class="bi bi-play-fill"></i> Start Monitoring
                            </button>
                            <button id="stopBtn" class="btn btn-danger btn-lg" disabled>
                                <i class="bi bi-stop-fill"></i> Stop Monitoring
                            </button>
                        </div>
                    </div>
                    <div class="card-body text-center" style="background: #000; padding: 20px; border-radius: 5px;">
                        <div id="videoContainer" style="display: none;">
                            <img id="videoFeed" src="" class="img-fluid rounded" alt="Live Camera Feed" style="max-width: 100%; height: auto;">
                        </div>
                        <div id="placeholderText">
                            <p class="text-secondary" style="margin-top: 100px; font-size: 18px;">
                                📹 Select a camera and click "Start Monitoring" to begin live video feed
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 11; width: auto; max-width: 400px;">
        <div id="toastContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const videoFeed = document.getElementById('videoFeed');
        const videoContainer = document.getElementById('videoContainer');
        const placeholderText = document.getElementById('placeholderText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const camera1Btn = document.getElementById('camera1Btn');
        const camera2Btn = document.getElementById('camera2Btn');
        const toastContainer = document.getElementById('toastContainer');
        const timerContainer = document.getElementById('timerContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        
        let displayedPlates = new Set(); // Track displayed plates
        let currentCamera = null;
        let timerInterval = null;
        let timeRemaining = 10;

        function resetTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            timeRemaining = 10;
            timerContainer.style.display = 'none';
        }

        function startTimer() {
            resetTimer();
            timerContainer.style.display = 'block';
            timerDisplay.textContent = '10';
            timeRemaining = 10;

            timerInterval = setInterval(() => {
                timeRemaining--;
                timerDisplay.textContent = timeRemaining;

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    timerContainer.style.display = 'none';
                    // Auto-reset camera selection
                    currentCamera = null;
                    camera1Btn.classList.remove('active');
                    camera2Btn.classList.remove('active');
                    startBtn.disabled = true;
                    showAlert('Camera selection expired. Please select a camera again.', 'warning');
                }
            }, 1000);
        }

        function selectCamera(index) {
            currentCamera = index;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            camera1Btn.classList.toggle('active', index === 0);
            camera2Btn.classList.toggle('active', index === 1);
            startTimer(); // Start 10-second countdown
        }

        camera1Btn.addEventListener('click', () => selectCamera(0));
        camera2Btn.addEventListener('click', () => selectCamera(1));

        // Alert system (instead of toast for status messages)
        function showAlert(message, type = 'info') {
            const alertId = `alert-${Date.now()}`;
            const alertHTML = `
                <div id="${alertId}" class="alert alert-${type} alert-dismissible fade show" role="alert" style="margin-top: 10px;">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            timerContainer.insertAdjacentHTML('afterend', alertHTML);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                const alertEl = document.getElementById(alertId);
                if (alertEl) {
                    alertEl.remove();
                }
            }, 5000);
        }

        // Notification system for license plate detections
        function showNotification(plate, date, time, location) {
            const notificationId = `notification-${Date.now()}`;
            
            const toastHTML = `
                <div id="${notificationId}" class="toast show" role="alert" style="background: rgba(13, 90, 180, 0.95); border: 1px solid #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);">
                    <div class="toast-header" style="background: rgba(0, 102, 204, 0.9); border-bottom: 1px solid #00d4ff;">
                        <strong class="me-auto text-light">🚗 Vehicle Detected</strong>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close" style="cursor: pointer;"></button>
                    </div>
                    <div class="toast-body text-light">
                        <p class="mb-2"><strong>License Plate:</strong> <span style="color: #00d4ff; font-weight: bold; font-size: 1.2em;">${plate}</span></p>
                        <p class="mb-2"><strong>Date:</strong> ${date}</p>
                        <p class="mb-2"><strong>Time:</strong> ${time}</p>
                        <p class="mb-0"><strong>Location:</strong> ${location}</p>
                    </div>
                </div>
            `;
            
            toastContainer.insertAdjacentHTML('beforeend', toastHTML);
            
            // Create Bootstrap toast instance and handle close
            const toastElement = document.getElementById(notificationId);
            if (toastElement) {
                const bsToast = new bootstrap.Toast(toastElement, {
                    autohide: false
                });
                
                // Close button click handler
                const closeBtn = toastElement.querySelector('[data-bs-dismiss="toast"]');
                if (closeBtn) {
                    closeBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        bsToast.hide();
                    });
                }
                
                // Remove element from DOM when hidden
                toastElement.addEventListener('hidden.bs.toast', () => {
                    toastElement.remove();
                });
            }
        }

        startBtn.addEventListener('click', () => {
            if (currentCamera === null) {
                showAlert('Please select a camera first', 'danger');
                return;
            }
            
            resetTimer(); // Stop the countdown timer
            
            fetch('/start_monitoring', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ camera: currentCamera })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'started') {
                        videoFeed.src = '/video_feed?t=' + new Date().getTime(); // Add timestamp to avoid caching
                        videoContainer.style.display = 'block';
                        placeholderText.style.display = 'none';
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                        camera1Btn.disabled = true;
                        camera2Btn.disabled = true;
                        displayedPlates.clear(); // Reset on new monitoring session
                        showAlert('Monitoring started - Camera ' + (currentCamera + 1), 'success');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('Failed to start monitoring', 'danger');
                });
        });

        stopBtn.addEventListener('click', () => {
            fetch('/stop_monitoring', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'stopped') {
                        videoFeed.src = '';
                        videoContainer.style.display = 'none';
                        placeholderText.style.display = 'block';
                        startBtn.disabled = false;
                        stopBtn.disabled = true;
                        camera1Btn.disabled = false;
                        camera2Btn.disabled = false;
                        currentCamera = null;
                        camera1Btn.classList.remove('active');
                        camera2Btn.classList.remove('active');
                        showAlert('Monitoring stopped', 'info');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('Failed to stop monitoring', 'danger');
                });
        });

        // Poll for new detections
        function loadLiveData() {
            if (!stopBtn.disabled) { // Only fetch if monitoring is active
                fetch('/get_live_data')
                    .then(response => response.json())
                    .then(data => {
                        data.forEach(item => {
                            const plateKey = `${item.plate}-${item.date}-${item.time}`;
                            // Only show notification if not already displayed
                            if (!displayedPlates.has(plateKey)) {
                                displayedPlates.add(plateKey);
                                showNotification(item.plate, item.date, item.time, item.location);
                            }
                        });
                    })
                    .catch(error => console.error('Error fetching live data:', error));
            }
        }

        // Poll every 2 seconds for new data when monitoring is active
        setInterval(loadLiveData, 2000);
    </script>
</body>
</html>
